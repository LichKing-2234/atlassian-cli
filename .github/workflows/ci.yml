name: CI

'on':
  pull_request:
  push:
    branches:
      - main
      - 'release/*'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.84.1

      - name: Build PyOxidizer smoke test
        run: |
          VERSION="$(
            python - <<'PY'
          import pathlib
          import tomllib

          print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          python .github/scripts/build-pyoxidizer-artifact.py \
            --target-os linux \
            --target-arch amd64 \
            --version "${VERSION}" \
            --archive-format tar.gz
          ./dist/atlassian/atlassian --help >/dev/null
