name: Release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              CHECKOUT_REF="refs/tags/${TAG}"
            else
              CHECKOUT_REF="${GITHUB_SHA}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            CHECKOUT_REF="${GITHUB_REF}"
          fi

          echo "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' || {
            echo "invalid tag: ${TAG}" >&2
            exit 1
          }

          VERSION="${TAG#v}"
          PYPROJECT_VERSION="$(
            git show "${CHECKOUT_REF}:pyproject.toml" |
              python -c 'import sys, tomllib; print(tomllib.load(sys.stdin.buffer)["project"]["version"])'
          )"
          [ "${VERSION}" = "${PYPROJECT_VERSION}" ] || {
            echo "tag version ${VERSION} does not match pyproject version ${PYPROJECT_VERSION}" >&2
            exit 1
          }

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
            CHECKOUT_REF="refs/tags/${TAG}"
          fi

          if printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            IS_PRERELEASE=false
          else
            IS_PRERELEASE=true
          fi

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "is_prerelease=${IS_PRERELEASE}"
            echo "checkout_ref=${CHECKOUT_REF}"
            echo "commit_sha=$(git rev-list -n 1 "${CHECKOUT_REF}")"
          } >> "${GITHUB_OUTPUT}"

  verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

  release:
    needs: [prepare, verify]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
            publish_checksums: false
          - runner: macos-latest
            target_os: darwin
            target_arch: arm64
            publish_checksums: true
    runs-on: ${{ matrix.runner }}
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Python
        if: ${{ matrix.target_os != 'linux' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        if: ${{ matrix.target_os != 'linux' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Build native binary
        if: ${{ matrix.target_os != 'linux' }}
        run: |
          pyinstaller atlassian.spec --clean --noconfirm
          ./dist/atlassian/atlassian --help >/dev/null

      - name: Build Linux binary
        if: ${{ matrix.target_os == 'linux' }}
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -e GITHUB_WORKSPACE=/workspace \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            python:3.12-bullseye \
            /bin/bash /workspace/.github/scripts/build-linux-compatible.sh

      - name: Package archive
        id: package
        run: |
          ARCHIVE_NAME="atlassian-cli_${VERSION}_${{ matrix.target_os }}_${{ matrix.target_arch }}.tar.gz"
          tar -C dist -czf "${ARCHIVE_NAME}" atlassian
          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        run: python .github/scripts/generate_release_notes.py "${TAG}" release-notes.md

      - name: Upload platform archive
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.commit_sha }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          body_path: release-notes.md
          overwrite_files: true
          files: ${{ steps.package.outputs.archive_name }}

      - name: Build release checksums
        if: ${{ matrix.publish_checksums }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          mkdir -p release-assets
          gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" --pattern 'atlassian-cli_*.tar.gz' --dir release-assets
          cd release-assets
          shasum -a 256 atlassian-cli_*.tar.gz > checksums.txt

      - name: Upload checksums
        if: ${{ matrix.publish_checksums }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          body_path: release-notes.md
          overwrite_files: true
          files: release-assets/checksums.txt
